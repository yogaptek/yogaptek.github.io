
<html>

<meta http-equiv="Content-Type" content="text/html; charset=windows-1252">
<style>
/* Wrapper utama */
.dialogWrap {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* Judul */
.topSection .topTitle {
  margin: 0.2em 0.5em;
  font-family: monospace;
}

/* Navigasi tab */
.tabNav {
  display: flex;
  border-bottom: 2px solid #bbb;
}
.tabNav button {
  flex: 1;
  padding: 0.5em;
  font-family: monospace;
  font-size: 1.1em;
  background-color: #eee;
  border: none;
  cursor: pointer;
}
.tabNav button.active {
  background-color: #ddd;
  border-bottom: 2px solid red;
}

/* Konten tab */
.tabContent {
  flex: 1;
  display: none; /* default hidden */
  max-height: 400px; /* batasi tinggi supaya scroll muncul */
  overflow-y: auto;  /* scroll vertikal */
  overflow-x: hidden;/* jangan scroll horizontal */
}
.tabContent.active {
  display: flex;
  flex-wrap: wrap;   /* wrap ke bawah */
  padding: 0.5em;
  overflow-y: auto;
  overflow-x: hidden;
  counter-reset: itemCounter -1; /* mulai dari 0 */
}

/* Kotak pose & emoji (aturan sama) */
.itemBox, .emojiBox {
  border: 2px solid #444;
  border-radius: 0.3em;
  width: 3em;
  height: 3em;
  margin: 0.2em;
  padding: 0.2em;
  background-color: #aaa;
  position: relative;
}
.itemBox img, .emojiBox img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.itemBox:hover, .emojiBox:hover { background-color: #eea; border-color: orange; }
.itemBox.selected, .emojiBox.selected { background-color: white; border-color: red; }

/* Nomor otomatis */
.itemBox::after, .emojiBox::after {
  counter-increment: itemCounter;
  content: counter(itemCounter);
  position: absolute;
  bottom: 0.2em;
  right: 0.3em;
  font-size: 0.8em;
  font-family: monospace;
  color: #222;
  background-color: rgba(255, 255, 255, 0.7);
  padding: 0.1em 0.3em;
  border-radius: 0.2em;
}

/* Bagian bawah */
.bottomSection {
  height: 2em;
  display: flex;
  justify-content: flex-end;
  align-items: stretch;
  padding: 0.5em 1.1em 1.1em 0;
}
.bottomSection button {
  width: 20%;
  margin-left: 5%;
  font-size: 1.3em;
  font-family: monospace;
  background-color: #eee;
  border-radius: 0.3em;
  box-shadow: 0.3em 0.3em 0.5em #444;
}
.bottomSection button:hover { background-color: #eff; }
.bottomSection button:active { background-color: #ffa; }
</style>
</head>
